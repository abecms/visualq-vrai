name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly: slow suite (TabICL integration + deployment gates).
    - cron: "30 2 * * *"

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (CPU torch)
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[dev]" ruff
      - name: Lint
        run: ruff check src tests
      - name: Fast tests
        run: pytest -m "not slow" -q

  slow:
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (CPU torch)
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[dev]"
      - name: Slow tests (TabICL + gates)
        run: pytest -m "slow" -q
